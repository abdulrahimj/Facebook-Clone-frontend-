<!DOCTYPE html>
<html>
  <head>
    <title>facebook-main-page</title>
    <link rel="stylesheet" href="facebook-styles/general.css">
    <link rel="stylesheet" href="facebook-styles/middle-page.css">
  </head>
  <body>
    <div class="middle-page-div">
      
      <!--The posting section of the feed-->
      
      <div class="post-div">
        <div class="post-text-div">
          <div class="post-profile-div">
            <img class="post-picture" src="profile-picture/pp.png">
          </div>
          <div class="text-div">
            <input class="post-text" type="text" placeholder="What's on your mind, Abdulrahim?">
          </div>
        </div>
        <div class="separator"></div>
        <div class="media-div">
          <div class="live-video-div">
            <img class="live-video-icon" src="icons/live-video.png">
            <p class="live-video-text">Live video</p>
          </div>
          <div class="photo-video-div">
            <img class="photo-video-icon" src="icons/photo-video.png">
            <p class="photo-video-text">Photo&#47;video</p>
          </div>
          <div class="reel-div">
            <img class="reel-icon" src="icons/reel.png">
            <p class="reel-text">Reel</p>
          </div>
        </div>
      </div>

      <!--The story section-->
        
      <div class="all-story-div">

        <!--my story div-->
        <div class="my-story-div">
          <div class="story-picture-div">
            <img class="story-picture" src="profile-picture/pp.png">
          </div>
          <div class="story-plus-div">
            <img class="plus-icon" src="icons/story-icon3.png">
          </div>
          <div class="create-story-text-div">
            <span class="create-story-text">Create story</span>
          </div>
        </div>

        <!--story2 div-->
        <div class="story2-div">
          <img class="story2-picture" src="profile-picture/pp2.jpg">
          <div class="story2-profile-picture-div">
            <img class="story2-profile-picture" src="profile-picture/pp9.jpg">
          </div>
          <div class="story2-profile-name-div">
            <span class="story2-profile-name">Amanatu Ajibola</span>
          </div>
        </div>
        <div class="story3-div"></div>
        <div class="story4-div"></div>
      </div>
      
      <div class="feed-div"></div>
    </div>    
  </body>
</html>
