<!DOCTYPE html>
<html>
  <head>
    <title>facebook-clone</title>
    <link rel="stylesheet" href="facebook-styles/general.css">
    <link rel="stylesheet" href="facebook-styles/login.css">
  </head>
  <body>
    <!--login page-->
    <div class="login-div">
      <div class="login-text-div">
        <h1>facebook</h1>
        <p>Connect with friends and the world around you on Facebook&#46;</p>
      </div>
      <div class="login-form-div">
        <div class="actual-login-form">
          <input class="email" type="text" placeholder="Email or phone number">
          <input  class="password" type="text" placeholder="Password">
          <button class="login-button">Log In</button>
          <p class="forgot-pass">Forgot password?</p>
          <div class="line"></div>
          <button class="new-account">Create new account</button>
          <p class="end-text"><span class="et">Create a Page</span> for a celebrity, brand or business&#46;</p>
        </div>
      </div>
    </div>
    
  </body>
</html>
